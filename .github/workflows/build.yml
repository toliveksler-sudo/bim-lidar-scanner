name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          echo "=== Files after xcodegen ==="
          ls -la
          find . -name "*.xcodeproj" -maxdepth 3
          echo "=== Default Xcode ==="
          xcode-select -p
          xcodebuild -version

      - name: Build (unsigned)
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 2 | head -1)
          SCHEME=$(basename "$PROJ" .xcodeproj)
          echo "Project: $PROJ  Scheme: $SCHEME"
          set -o pipefail
          xcodebuild \
            -project "$PROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            build 2>&1 | tail -80 || true

      - name: Find and package .app
        run: |
          echo "=== Searching for .app ==="
          find ./build -name "*.app" 2>/dev/null
          APP_PATH=$(find ./build -name "*.app" -not -path "*/iphoneos/*.app.dSYM*" | grep "iphoneos" | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ./build -name "*.app" | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app file found"
            find ./build -type d | head -20
            exit 1
          fi
          echo "Using: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r BIMLidar.ipa Payload/
          ls -lh BIMLidar.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BIMLidar-IPA
          path: BIMLidar.ipa
          retention-days: 30
