name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          ls -la
          ls -la *.xcodeproj/ || echo "xcodeproj not in root"
          find . -name "*.xcodeproj" -maxdepth 3

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build (unsigned)
        run: |
          PROJ=$(find . -name "*.xcodeproj" -maxdepth 2 | head -1)
          SCHEME=$(basename "$PROJ" .xcodeproj)
          echo "Project: $PROJ  Scheme: $SCHEME"
          xcodebuild \
            -project "$PROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            build 2>&1 | tail -50

      - name: Find and package .app
        run: |
          echo "=== Build directory structure ==="
          find ./build -name "*.app" 2>/dev/null || echo "No .app found"
          APP_PATH=$(find ./build -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app file found after build"
            find ./build -type f | head -30
            exit 1
          fi
          echo "Found: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r BIMLidar.ipa Payload/
          ls -lh BIMLidar.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BIMLidar-IPA
          path: BIMLidar.ipa
          retention-days: 30
