name: BIMLidar
options:
  bundleIdPrefix: com.bimscanner
  deploymentTarget:
    iOS: "16.0"
  defaultConfig: Release

settings:
  SWIFT_VERSION: "5.9"
  ENABLE_BITCODE: "NO"

targets:
  BIMLidar:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
    info:
      path: Info.plist
      properties:
        CFBundleName: BIM LiDAR
        CFBundleDisplayName: BIM LiDAR
        CFBundleIdentifier: com.bimscanner.lidar
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen: {}
        NSCameraUsageDescription: Камера используется для LiDAR сканирования объектов
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arkit
          - lidar-depth-camera
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.bimscanner.lidar
      SWIFT_VERSION: "5.9"
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: "NO"
      CODE_SIGNING_ALLOWED: "NO"
      TARGETED_DEVICE_FAMILY: "1"
    frameworks:
      - ARKit.framework
      - RealityKit.framework
